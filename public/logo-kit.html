<!DOCTYPE html>
<html>
<head><title>EXP³ Logos</title>
<style>
body { font-family: system-ui; display: flex; flex-direction: column; align-items: center; gap: 40px; padding: 60px 20px; }
.logo-section { text-align: center; }
.logo-section h2 { margin-bottom: 16px; }
.dark-bg { background: #0A0F1C; padding: 32px 48px; border-radius: 12px; display: inline-block; }
.light-bg { background: #FFFFFF; padding: 32px 48px; border-radius: 12px; border: 1px solid #ddd; display: inline-block; }
.logo-text { font-family: system-ui, -apple-system, sans-serif; font-weight: 700; font-size: 48px; letter-spacing: -0.5px; }
.logo-text .exp-white { color: #FFFFFF; }
.logo-text .exp-dark { color: #0A0F1C; }
.logo-text .cube { background: linear-gradient(135deg, hsl(187, 100%, 50%), hsl(187, 100%, 60%)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 30px; vertical-align: super; }
</style>
</head>
<body>
<h1>EXP³ — Logo Kit</h1>
<div class="logo-section">
  <h2>Versão para fundo escuro</h2>
  <div class="dark-bg">
    <span class="logo-text"><span class="exp-white">EXP</span><span class="cube">³</span></span>
  </div>
</div>
<div class="logo-section">
  <h2>Versão para fundo claro</h2>
  <div class="light-bg">
    <span class="logo-text"><span class="exp-dark">EXP</span><span class="cube">³</span></span>
  </div>
</div>
<p style="color:#666; margin-top: 20px;">Clique com botão direito → "Salvar imagem como..." ou faça screenshot para exportar.</p>
</body>
</html>
